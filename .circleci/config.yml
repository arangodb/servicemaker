version: 2.1

orbs:
  slack: circleci/slack@5.1.1
  trivy-scan: arangodb/trivy-scan@0.0.3

# Shared Trivy scan settings (aligned with platform-ui)
x-trivy-scan: &trivy-scan-settings
  severity: "CRITICAL,HIGH"
  fail-on-findings: true
  ignore-unfixed: true

parameters:
  security_scan:
    type: boolean
    default: false
  rebuild_base_images:
    type: boolean
    default: false

commands:
  build-and-scan-image:
    description: Build image (optional) and scan with trivy-scan orb
    parameters:
      image_name:
        type: string
      build_image:
        type: boolean
        default: true
      scan_timeout:
        type: string
        default: "60m"
    steps:
      - when:
          condition: << parameters.build_image >>
          steps:
            - run:
                name: Build arangodb/<< parameters.image_name >>
                command: |
                  cd baseimages
                  IMAGE="<< parameters.image_name >>"
                  if [ "${IMAGE}" = "py12cugraph" ] || [ "${IMAGE}" = "py12torch" ]; then
                    docker build -f Dockerfile.py12base -t arangodb/py12base .
                  fi
                  docker build -f "Dockerfile.${IMAGE}" -t "arangodb/${IMAGE}" .
                no_output_timeout: << parameters.scan_timeout >>
      - trivy-scan/scan:
          <<: *trivy-scan-settings
          image-ref: arangodb/<< parameters.image_name >>

jobs:
  build-and-test:
    docker:
      - image: cimg/rust:1.90
    steps:
      - checkout
      
      # Setup Docker
      - setup_remote_docker:
          docker_layer_caching: true
      
      # Restore cargo cache
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
            - cargo-
      
      # Check code compiles
      - run:
          name: Cargo check
          command: cargo check
      
      # Run clippy linter
      - run:
          name: Cargo clippy
          command: cargo clippy --all-targets --all-features -- -D warnings
      
      # Build the project in release mode
      - run:
          name: Build project (release mode)
          command: cargo build --release
      
      # Save cargo cache
      - save_cache:
          paths:
            - /home/circleci/.cargo/registry
            - /home/circleci/.cargo/git
            - target
          key: cargo-{{ checksum "Cargo.lock" }}
      
      # Install Helm
      - run:
          name: Install Helm
          command: |
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            helm version
      
      # Run integration tests
      - run:
          name: Run integration tests
          command: cargo run --release --bin integration_tests -- --no-zip-test

  security-scan:
    parameters:
      image_name:
        type: string
      build_image:
        type: boolean
        default: true
    docker:
      # root required: trivy-scan orb installs the binary to /usr/local/bin
      - image: cimg/base:stable
        user: root
    steps:
      - checkout
      
      # Setup Docker
      - setup_remote_docker:
          docker_layer_caching: true
      - build-and-scan-image:
          image_name: << parameters.image_name >>
          build_image: << parameters.build_image >>
      - run:
          name: In-container scan arangodb/<< parameters.image_name >>
          command: |
            chmod +x baseimages/scan_security.sh
            SCAN_SINGLE_IMAGE=<< parameters.image_name >> IN_CONTAINER_ONLY=1 baseimages/scan_security.sh
          no_output_timeout: 30m

  security-scan-notify:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Check security scan results
          command: |
            # Requires CIRCLE_TOKEN (project API token) in slack-secrets context
            if [ -z "${CIRCLE_TOKEN:-}" ]; then
              echo "ERROR: CIRCLE_TOKEN is not set (add project API token to slack-secrets context)" >&2
              exit 1
            fi
            SCAN_JOBS="py12base py12cugraph py12torch node22base test-service test-service-nodejs"
            API_URL="https://circleci.com/api/v2/workflow/${CIRCLE_WORKFLOW_ID}/job"
            RESPONSE=$(curl -sf -H "Circle-Token: ${CIRCLE_TOKEN}" "${API_URL}")
            FAILED_JOBS=""
            for job in ${SCAN_JOBS}; do
              STATUS=$(echo "${RESPONSE}" | jq -r --arg n "${job}" '.items[] | select(.name == $n) | .status' | head -1)
              if [ "${STATUS}" = "failed" ] || [ "${STATUS}" = "canceled" ]; then
                FAILED_JOBS="${FAILED_JOBS} ${job}"
              fi
            done
            if [ -n "${FAILED_JOBS}" ]; then
              echo "Security scan failed for:${FAILED_JOBS}"
              echo "Workflow: ${CIRCLE_WORKFLOW_URL}"
              exit 1
            fi
            echo "All security scan jobs passed."
      - slack/notify:
          event: fail
          mentions: '@neunhoef'
          channel: 'baseimagesecurityscan'
          template: basic_fail_1

  rebuild-base-images:
    docker:
      - image: cimg/rust:1.90
    steps:
      - checkout
      
      # Setup Docker
      - setup_remote_docker:
          docker_layer_caching: true
      
      # Login to Docker Hub
      - run:
          name: Login to Docker Hub
          command: |
            echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
      
      # Build base images
      - run:
          name: Build base images
          command: |
            cd baseimages
            make build
          no_output_timeout: 60m
      
      # Push base images
      - run:
          name: Push base images to Docker Hub
          command: |
            cd baseimages
            make push
     
      # Build and push test-service images
      - run:
          name: Build and push test-service images
          command: |
            cargo build --release
            make test-service test-service-nodejs
          no_output_timeout: 60m
workflows:
  version: 2
  build-and-test:
    when:
      and:
        - equal: [false, << pipeline.parameters.security_scan >>]
        - equal: [false, << pipeline.parameters.rebuild_base_images >>]
    jobs:
      - build-and-test:
          filters:
            branches:
              ignore: []  # Run on all branches
  
  security-scan-nightly:
    when: << pipeline.parameters.security_scan >>
    jobs:
      # Parallel jobs
      - security-scan:
          name: py12base
          image_name: py12base
          build_image: true
      - security-scan:
          name: py12cugraph
          image_name: py12cugraph
          build_image: true
      - security-scan:
          name: py12torch
          image_name: py12torch
          build_image: true
      - security-scan:
          name: node22base
          image_name: node22base
          build_image: true
      - security-scan:
          name: test-service
          image_name: test-service
          build_image: false
      - security-scan:
          name: test-service-nodejs
          image_name: test-service-nodejs
          build_image: false
      - security-scan-notify:
          context: slack-secrets
          requires:
            - py12base:
                optional: true
            - py12cugraph:
                optional: true
            - py12torch:
                optional: true
            - node22base:
                optional: true
            - test-service:
                optional: true
            - test-service-nodejs:
                optional: true
  
  rebuild-base-images-manual:
    when: << pipeline.parameters.rebuild_base_images >>
    jobs:
      - rebuild-base-images:
          context: docker-hub

