version: 2.1

orbs:
  slack: circleci/slack@5.1.1
  trivy-scan: arangodb/trivy-scan@0.0.1

# Shared Trivy scan settings (aligned with platform-ui)
x-trivy-scan: &trivy-scan-settings
  severity: "CRITICAL,HIGH"
  fail-on-findings: true
  ignore-unfixed: true

parameters:
  security_scan:
    type: boolean
    default: false
  rebuild_base_images:
    type: boolean
    default: false

commands:
  build-and-scan-image:
    description: Build image and scan with trivy-scan orb
    parameters:
      image_name:
        type: string
      build_image:
        type: boolean
        default: true
      scan_timeout:
        type: string
        default: "60m"
    steps:
      - when:
          condition: << parameters.build_image >>
          steps:
            - run:
                name: Build arangodb/<< parameters.image_name >>
                command: |
                  cd baseimages
                  docker build -f "Dockerfile.<< parameters.image_name >>" -t "arangodb/<< parameters.image_name >>" .
                no_output_timeout: << parameters.scan_timeout >>
      - trivy-scan/scan:
          <<: *trivy-scan-settings
          image-ref: arangodb/<< parameters.image_name >>
          timeout: << parameters.scan_timeout >>

jobs:
  build-and-test:
    docker:
      - image: cimg/rust:1.90
    steps:
      - checkout
      
      # Setup Docker
      - setup_remote_docker:
          docker_layer_caching: true
      
      # Restore cargo cache
      - restore_cache:
          keys:
            - cargo-{{ checksum "Cargo.lock" }}
            - cargo-
      
      # Check code compiles
      - run:
          name: Cargo check
          command: cargo check
      
      # Run clippy linter
      - run:
          name: Cargo clippy
          command: cargo clippy --all-targets --all-features -- -D warnings
      
      # Build the project in release mode
      - run:
          name: Build project (release mode)
          command: cargo build --release
      
      # Save cargo cache
      - save_cache:
          paths:
            - /home/circleci/.cargo/registry
            - /home/circleci/.cargo/git
            - target
          key: cargo-{{ checksum "Cargo.lock" }}
      
      # Install Helm
      - run:
          name: Install Helm
          command: |
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            helm version
      
      # Run integration tests
      - run:
          name: Run integration tests
          command: cargo run --release --bin integration_tests -- --no-zip-test

  security-scan:
    docker:
      # root required: trivy-scan orb installs the binary to /usr/local/bin
      - image: cimg/base:stable
        user: root
    steps:
      - checkout
      
      # Setup Docker
      - setup_remote_docker:
          docker_layer_caching: true
      
      - build-and-scan-image:
          image_name: py12base
      - build-and-scan-image:
          image_name: py12cugraph
      - build-and-scan-image:
          image_name: py12torch
      - build-and-scan-image:
          image_name: node22base
      - build-and-scan-image:
          image_name: test-service
          build_image: false
          scan_timeout: "30m"
      - build-and-scan-image:
          image_name: test-service-nodejs
          build_image: false
          scan_timeout: "30m"
      
      - run:
          name: Scan in-container dependency trees (all images)
          command: |
            chmod +x baseimages/scan_security.sh
            IN_CONTAINER_ONLY=1 baseimages/scan_security.sh
          no_output_timeout: 30m
      
      # Notify Slack on failure
      - slack/notify:
          event: fail
          mentions: '@neunhoef'
          channel: 'baseimagesecurityscan'
          template: basic_fail_1

  rebuild-base-images:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      
      # Setup Docker
      - setup_remote_docker:
          docker_layer_caching: true
      
      # Login to Docker Hub
      - run:
          name: Login to Docker Hub
          command: |
            echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
      
      # Build base images
      - run:
          name: Build base images
          command: |
            cd baseimages
            make build
          no_output_timeout: 60m
      
      # Push base images
      - run:
          name: Push base images to Docker Hub
          command: |
            cd baseimages
            make push
          
workflows:
  version: 2
  build-and-test:
    when:
      and:
        - equal: [false, << pipeline.parameters.security_scan >>]
        - equal: [false, << pipeline.parameters.rebuild_base_images >>]
    jobs:
      - build-and-test:
          filters:
            branches:
              ignore: []  # Run on all branches
  
  security-scan-nightly:
    when: << pipeline.parameters.security_scan >>
    jobs:
      - security-scan:
          context: slack-secrets
  
  rebuild-base-images-manual:
    when: << pipeline.parameters.rebuild_base_images >>
    jobs:
      - rebuild-base-images:
          context: docker-hub

